<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Tracker</title>

<!-- ADSENSE SCRIPT - ADD THIS -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2624282669573972" crossorigin="anonymous"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#1a1a2e;min-height:100vh;padding:15px;color:white}
.card{background:rgba(255,255,255,0.1);padding:15px;border-radius:15px;margin-bottom:15px}
h1{text-align:center;margin-bottom:15px}
input{width:100%;padding:12px;border-radius:8px;border:none;margin-bottom:10px}
button{width:100%;padding:12px;background:#00d4ff;border:none;border-radius:8px;font-weight:bold;margin-bottom:8px}
.btn{background:rgba(255,255,255,0.15);color:white;padding:10px;border-radius:8px;text-align:center;margin:3px}
.grid{display:flex;flex-wrap:wrap;gap:5px}
.result{background:white;color:#333;padding:15px;border-radius:15px;display:none;margin-top:15px}
.flight-num{font-size:1.5rem;font-weight:bold;color:#007bff}
.airline{color:#666}
.route{display:flex;justify-content:space-between;margin:15px 0}
.airport{text-align:center;flex:1}
.code{font-size:1.5rem;font-weight:bold}
.status{background:#d4edda;padding:5px 12px;border-radius:15px;font-weight:bold}
.book-btn{display:block;padding:12px;margin-top:10px;background:linear-gradient(90deg,#0776bc,#00d687);color:white;text-align:center;border-radius:8px;text-decoration:none;font-weight:bold}

/* AD STYLES */
.ad-container{background:white;padding:10px;margin-bottom:15px;border-radius:10px;text-align:center}
.ad-label{font-size:0.7rem;color:#888;margin-bottom:5px}
</style>
</head>
<body>

<h1>✈️ Flight Tracker</h1>

<!-- TOP AD -->
<div class="ad-container">
<div class="ad-label">Advertisement</div>
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-2624282669573972"
     data-ad-slot="1234567890"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
</div>

<div class="card">
<input type="text" id="flightInput" placeholder="Flight number">
<button onclick="trackFlight()">Track</button>
</div>

<div class="card">
<div class="grid">
<div class="btn" onclick="track('BA117')">BA117</div>
<div class="btn" onclick="track('UA500')">UA500</div>
<div class="btn" onclick="track('DAL44')">DAL44</div>
<div class="btn" onclick="track('AA100')">AA100</div>
<div class="btn" onclick="track('AF123')">AF123</div>
</div>
</div>

<div id="result" class="result">
<div class="flight-num" id="flightNum"></div>
<div class="airline" id="airline"></div>
<div class="route">
<div class="airport"><div class="code" id="fromCode"></div><div id="fromCity"></div></div>
<div>✈️</div>
<div class="airport"><div class="code" id="toCode"></div><div id="toCity"></div></div>
</div>
<span class="status" id="status"></span>

<a href="#" id="bookLink" class="book-btn" target="_blank">🔍 Book Similar Flights</a>
</div>

<!-- BOTTOM AD -->
<div class="ad-container">
<div class="ad-label">Advertisement</div>
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-2624282669573972"
     data-ad-slot="0987654321"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
</div>

<script>
const flights={
'BA117':{airline:'British Airways',from:'LHR',to:'JFK',fromCity:'London',toCity:'New York',status:'On Time'},
'UA500':{airline:'United Airlines',from:'SFO',to:'ORD',fromCity:'San Francisco',toCity:'Chicago',status:'On Time'},
'DAL44':{airline:'Delta Airlines',from:'LAX',to:'JFK',fromCity:'Los Angeles',toCity:'New York',status:'Delayed'},
'AA100':{airline:'American Airlines',from:'DFW',to:'LAX',fromCity:'Dallas',toCity:'Los Angeles',status:'On Time'},
'AF123':{airline:'Air France',from:'CDG',to:'SFO',fromCity:'Paris',toCity:'San Francisco',status:'On Time'}
};

function track(n){document.getElementById('flightInput').value=n;trackFlight()}

function trackFlight(){
const input=document.getElementById('flightInput').value.toUpperCase();
const data=flights[input];
if(data){
document.getElementById('flightNum').innerText=input;
document.getElementById('airline').innerText=data.airline;
document.getElementById('fromCode').innerText=data.from;
document.getElementById('fromCity').innerText=data.fromCity;
document.getElementById('toCode').innerText=data.to;
document.getElementById('toCity').innerText=data.toCity;
document.getElementById('status').innerText=data.status;
document.getElementById('bookLink').href='https://www.skyscanner.com/transport/flights-from/'+data.from+'/to/'+data.to;
document.getElementById('result').style.display='block';
}else{
alert('Try BA117, UA500, DAL44, AA100, AF123');
}
}

// LOAD ADS
(adsbygoogle = window.adsbygoogle || []).push({});
</script>
</body>
</html>
